apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-creds
  namespace: demo
spec:
  refreshInterval: 45s 
  secretStoreRef:
    name: aws-store
    kind: SecretStore
  target:
    name: db-secret 
  data:
    - secretKey: password
      remoteRef:
        key: demo/db/password 