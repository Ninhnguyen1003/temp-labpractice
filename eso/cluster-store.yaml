apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-cluster-store
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-creds
            namespace: demo # Ép Operator mò vào đúng namespace demo lấy key
            key: access-key
          secretAccessKeySecretRef:
            name: aws-creds
            namespace: demo # Ép Operator mò vào đúng namespace demo lấy key
            key: secret-key