# Build and push Docker image to GitHub Container Registry
name: Build and Push Image

on:
  push:
    branches:
      - main
    paths:
      - 'src/api/**'
      - '.github/workflows/build-push.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/w10-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write # Thêm quyền để hỗ trợ Cosign nếu cần

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate semantic version
        id: semver
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "(BREAKING CHANGE:|!:)"
          minor_pattern: "^feat"
          version_format: "${major}.${minor}.${patch}"
          bump_each_commit: false

      # ========================================================
      # FIX LỖI CHỮ HOA: Chuyển tên Image về lowercase tự động
      # ========================================================
      - name: Set lowercase image name
        id: string
        run: |
          echo "IMAGE_LC=${IMAGE_NAME,,}" >> $GITHUB_OUTPUT
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Sử dụng tên image đã được chuyển về chữ viết thường
          images: ${{ env.REGISTRY }}/${{ steps.string.outputs.IMAGE_LC }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.semver.outputs.version }}
            type=sha,prefix=v${{ steps.semver.outputs.version }}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./src/api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # ==========================================
      # BƯỚC THÊM MỚI 1: TRIVY SCAN (Đã sửa biến viết thường)
      # ==========================================
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.string.outputs.IMAGE_LC }}:${{ steps.semver.outputs.version }}
          severity: 'HIGH,CRITICAL'
          exit-code: 1

      # ==========================================
      # BƯỚC THÊM MỚI 2: COSIGN SIGN (Đã sửa biến viết thường)
      # ==========================================
      - name: Install Cosign
        uses: sigstore/cosign-installer@main

      - name: Sign Docker Image
        run: |
          echo "${{ secrets.COSIGN_PRIVATE_KEY }}" > cosign.key
          # ĐÃ SỬA THÀNH BIẾN VIẾT THƯỜNG:
          cosign sign --key cosign.key ${{ env.REGISTRY }}/${{ steps.string.outputs.IMAGE_LC }}:${{ steps.semver.outputs.version }}
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}

      # ==========================================
      # TIẾP TỤC CÁC BƯỚC CŨ ĐỂ CẬP NHẬT GITOPS
      # ==========================================
      - name: Update rollout.yaml with new version
        run: |
          # ĐÃ SỬA THÀNH BIẾN VIẾT THƯỜNG:
          sed -i "s|image: ghcr.io/.*/w10-api:.*|image: ${{ env.REGISTRY }}/${{ steps.string.outputs.IMAGE_LC }}:${{ steps.semver.outputs.version }}|g" app-api/rollout.yaml
          sed -i "s|value: \"v.*\"|value: \"v${{ steps.semver.outputs.version }}\"|g" app-api/rollout.yaml
          
      - name: Commit and push version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app-api/rollout.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: bump version to v${{ steps.semver.outputs.version }}"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Create git tag
        run: |
          if ! git rev-parse v${{ steps.semver.outputs.version }} >/dev/null 2>&1; then
            git tag v${{ steps.semver.outputs.version }}
            git push origin v${{ steps.semver.outputs.version }}
          else
            echo "Tag v${{ steps.semver.outputs.version }} already exists"
          fi