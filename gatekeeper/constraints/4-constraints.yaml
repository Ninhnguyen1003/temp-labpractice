---
# Luật 1: Cấm sử dụng image tag :latest
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sAllowedRepos
metadata:
  name: block-latest-tag
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
  parameters:
    # Logic: Chỉ cho phép các tag KHÔNG PHẢI latest (hoặc cấu hình tùy thuộc vào Template có sẵn trong cụm)
    # Lưu ý: Điền đúng cấu hình template `K8sAllowedRepos` hoặc `K8sRequiredTags` của khóa học cung cấp.

---
# Luật 2: Bắt buộc phải khai báo resources.limits (Tránh việc Pod ăn sạch RAM của Node)
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sContainerLimits
metadata:
  name: require-cpu-memory-limits
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
  parameters:
    cpu: "200m"
    memory: "256Mi"

---
# Luật 3: Cấm runAsUser: 0 (Không cho phép container chạy quyền Root để tránh leo thang đặc quyền)
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sCompulsoryExecutionAsNonRoot
metadata:
  name: enforce-non-root
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]

---
# Luật 4: Cấm hostNetwork: true (Không cho Pod chiếm dụng port/mạng trực tiếp của Node vật lý)
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sHostNetwork
metadata:
  name: block-host-network
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]