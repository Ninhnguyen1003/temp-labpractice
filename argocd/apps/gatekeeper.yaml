apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatekeeper-operator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Ninhnguyen1003/temp-labpractice.git
    targetRevision: HEAD
    path: gatekeeper/manifests 
  destination:
    server: https://kubernetes.default.svc
    namespace: gatekeeper-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
