apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatekeeper-constraints
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Ninhnguyen1003/temp-labpractice.git
    targetRevision: HEAD
    path: gatekeeper/constraints
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true