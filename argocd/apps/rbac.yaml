apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lab1-1-rbac
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Ninhnguyen1003/temp-labpractice.git' 
    targetRevision: HEAD
    path: rbac    
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default 
  syncPolicy:
    automated:
      prune: true
      selfHeal: true